<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ book.title }}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #eef2f3, #d9e4f5);
            margin: 0;
            padding: 40px;
        }

        .card {
            max-width: 800px;
            margin: auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-wrap: wrap;
        }

        .image {
            flex: 1;
            min-width: 300px;
        }

        .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            flex: 1;
            padding: 25px;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .author {
            font-style: italic;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        .info {
            margin: 10px 0;
            font-size: 16px;
            color: #34495e;
        }

        .tag {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 15px;
        }

        .ua {
            background: #27ae60;
            color: white;
        }

        .en {
            background: #2980b9;
            color: white;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #fff;
            background: #34495e;
            padding: 10px 15px;
            border-radius: 8px;
        }

        a:hover {
            background: #2c3e50;
        }
    </style>
</head>

<body>

<div class="card">

    <div class="image">
        <img src="{{ book.image }}">
    </div>

    <div class="content">
        <div class="title">{{ book.title }}</div>
        <div class="author">{{ book.author }}</div>

        <div class="info">Рік випуску: {{ book.year }}р.</div>
        <div class="info">Кількість сторінок: {{ book.pages }}с.</div>

        {% if book.language == "ua" %}
            <div class="tag ua">Українська література</div>
        {% else %}
            <div class="tag en">Зарубіжна література</div>
        {% endif %}

        <br>

        <a href="/">⬅ Повернутись назад до списку</a>
    </div>

</div>

</body>
</html>
